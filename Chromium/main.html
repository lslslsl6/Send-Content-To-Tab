<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>__MSG_extName__</title>
    <link rel="stylesheet" href="css/sidepanel.css">
</head>
<body>
    <div id="app">
        <div class="container">
            <div id="incognitoWarning" class="warning-banner hidden">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                    <line x1="12" y1="9" x2="12" y2="13"></line>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
                <span>__MSG_incognitoWarning__</span>
            </div>
            <div id="fileAccessWarning" class="warning-banner hidden">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                    <line x1="12" y1="9" x2="12" y2="13"></line>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
                <span>__MSG_fileAccessWarning__</span>
            </div>
            <textarea id="textInput" placeholder="__MSG_sidePanelPlaceholder__"></textarea>
            <div id="emptyTextError" class="empty-text-error hidden">__MSG_emptyTextError__</div>
            <div id="unsupportedPageError" class="unsupported-page-error hidden">__MSG_unsupportedPageError__</div>
            
            <div class="textarea-actions">
                <button id="getCurrentUrlBtn" class="btn btn-secondary btn-action" title="__MSG_getCurrentUrl__">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="2" y1="12" x2="22" y2="12"></line>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                    </svg>
                    <span>__MSG_getCurrentUrl__</span>
                </button>
                <button id="clearTextBtn" class="btn btn-secondary btn-clear" title="__MSG_clearText__" disabled>
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                    <span>__MSG_clearText__</span>
                </button>
            </div>
            
            <div id="stagedTextButtons" class="staged-text-buttons hidden">
                <button id="saveStagedBtn" class="btn btn-secondary" title="__MSG_saveStagedText__" disabled>
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                        <polyline points="17 21 17 13 7 13 7 21"></polyline>
                        <polyline points="7 3 7 8 15 8"></polyline>
                    </svg>
                    <span>__MSG_saveStagedText__</span>
                </button>
                <button id="loadStagedBtn" class="btn btn-secondary" title="__MSG_loadStagedText__" disabled>
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="1 4 1 10 7 10"></polyline>
                        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
                    </svg>
                    <span>__MSG_loadStagedText__</span>
                </button>
            </div>
            
            <div class="button-group">
                <button id="openTabBtn" class="btn btn-primary" title="__MSG_sidePanelOpenTab__">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                        <line x1="8" y1="21" x2="16" y2="21"></line>
                        <line x1="12" y1="17" x2="12" y2="21"></line>
                    </svg>
                    <span>__MSG_sidePanelOpenTab__</span>
                </button>
                
                <button id="openIncognitoBtn" class="btn btn-secondary" title="__MSG_sidePanelOpenIncognito__">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    <span>__MSG_sidePanelOpenIncognito__</span>
                </button>
            </div>
            
            <div class="settings-row">
                <button id="settingsBtn" class="btn btn-icon" title="__MSG_sidePanelSettings__">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>
    
    <div id="settingsPanel" class="settings-panel hidden">
        <div class="settings-header">
            <h3>__MSG_sidePanelSettings__</h3>
            <button id="closeSettingsBtn" class="btn btn-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        <div class="settings-content">
            <label class="setting-item" id="contextMenuItem">
                <div class="setting-text">
                    <span class="setting-label">__MSG_settingsEnableContextMenu__</span>
                    <span class="setting-desc">__MSG_settingsEnableContextMenuDesc__</span>
                </div>
                <span class="toggle">
                    <input type="checkbox" id="contextMenuToggle">
                    <span class="toggle-slider"></span>
                </span>
            </label>
            <label class="setting-item" id="retainTextItem">
                <div class="setting-text">
                    <span class="setting-label">__MSG_settingsRetainText__</span>
                    <span class="setting-desc">__MSG_settingsRetainTextDesc__</span>
                </div>
                <span class="toggle">
                    <input type="checkbox" id="retainTextToggle">
                    <span class="toggle-slider"></span>
                </span>
            </label>
        </div>
    </div>

    <script src="js/sidepanel.js"></script>
</body>
</html>
